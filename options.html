<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Language Shadowing for YouTube - 初期設定</title>
  <link rel="stylesheet" href="popup.css">
  <style>
    /* オプションページ用のレイアウト微調整 */
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
    }
    .app-container {
      max-width: 450px;
      width: 90%;
    }
    .card {
      padding: 30px;
    }
    .description strong {
      color: var(--color-accent);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <span class="logo-icon">🔊</span>
        <h1>Language Shadowing for YouTube</h1>
      </div>
      <p class="subtitle" data-i18n="optionsSubtitle">マイク使用許可の設定</p>
    </header>

    <main>
      <section class="card">
        <div class="card-icon">🎙️</div>
        <h2 data-i18n="optionsTitle">マイクのアクセス許可を有効にします</h2>
        <p class="description" id="instruction-text">
          <span data-i18n="optionsDesc1">マイクで話した音声をスピーカーにエコーバックするために、マイクへのアクセス権が必要です。</span><br><br>
          <span id="desc2" data-i18n="optionsDesc2Auto">ブラウザの左上に表示されるポップアップで<strong>「サイトへのアクセス時は許可」</strong>を選択してください。</span><br>
          <small style="color: var(--color-accent); font-weight: bold;" data-i18n="optionsWarning">※「今回のみ許可」を選択すると正常に動作しません。</small>
        </p>
        <button id="request-btn" class="btn btn-primary" style="display: none;" data-i18n="optionsBtn">
          マイクの使用を許可する
        </button>
        <div id="success-message" class="hidden" style="color: var(--color-accent); text-align: center; margin-top: 15px; font-weight: 600; font-size: 14px;" data-i18n="optionsSuccess">
          ✓ 許可が完了しました！このタブを閉じて拡張機能をご利用ください。
        </div>
      </section>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
