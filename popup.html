<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Shadowing for YouTube</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <span class="logo-icon">🔊</span>
        <h1 data-i18n="appName">Language Shadowing for YouTube</h1>
      </div>
      <p class="subtitle" data-i18n="subtitle">Realtime Voice Monitor</p>
    </header>

    <main>
      <!-- パーミッション要求画面 -->
      <section id="permission-request" class="card hidden">
        <div class="card-icon">🎙️</div>
        <h2 data-i18n="permissionTitle">マイクの許可が必要です</h2>
        <p class="description" data-i18n="permissionDesc">
          この拡張機能は、あなたのマイク入力をスピーカーにエコーバックするためにマイクのアクセス許可を必要とします。
        </p>
        <button id="grant-permission-btn" class="btn btn-primary" data-i18n="btnGrantPermission">
          マイクの使用を許可する
        </button>
      </section>

      <!-- メインコントロール画面 -->
      <section id="main-controls" class="card">
        <div class="status-panel">
          <!-- エコーオンの時に動く視覚的アニメーション -->
          <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </div>
          <div class="status-info">
            <span id="status-badge" class="badge badge-idle">OFF</span>
            <span id="status-text" data-i18n="statusIdle">待機中</span>
          </div>
        </div>

        <button id="toggle-btn" class="btn btn-toggle idle">
          <span class="mic-icon">🎙️</span>
          <span class="btn-text" data-i18n="btnHoldToRecord">押している間 録音</span>
        </button>

        <div class="shortcut-tip" id="shortcut-container">
          <p data-i18n="tipHoldToRecord">Webページ上で長押しして録音:</p>
          <div class="shortcut-display-area" id="shortcut-display-area">
            <div class="keys" id="shortcut-keys">
              <kbd>Shift</kbd> + <kbd>Space</kbd>
            </div>
            <button class="btn-text-link" id="edit-shortcut-btn" data-i18n="btnEdit">変更</button>
          </div>
          <div class="shortcut-edit-area hidden" id="shortcut-edit-area">
            <p class="edit-instruction"><span data-i18n="editInstruction" id="edit-instruction-text">新しいキーを押してください</span><br><small data-i18n="editCancel" id="edit-instruction-cancel">(Escでキャンセル)</small></p>
          </div>
          <small style="display: block; margin-top: 8px; font-size: 10px; color: var(--color-accent); font-weight: bold; line-height: 1.3;" data-i18n="shortcutReloadNote">※設定前に表示したタブは再読み込み (Win: F5 / Mac: ⌘R) が必要です。</small>
        </div>

        <div class="settings-area" id="settings-area">
          <label class="setting-item">
            <input type="checkbox" id="setting-auto-pause">
            <span class="setting-label" data-i18n="settingAutoPause">録音時に動画を一時停止</span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="setting-auto-resume" disabled>
            <span class="setting-label" data-i18n="settingAutoResume">再生終了後に動画を再開</span>
          </label>
        </div>
      </section>
    </main>

    <footer>
      <p data-i18n="footerNote">🎧 ハウリング防止のためヘッドホンを推奨します</p>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
